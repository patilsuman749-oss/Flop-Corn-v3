<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Movie Collection | Flop Corn 🍿
    </title>


    <!-- FLOP CORN CSS -->

    <link
        rel="stylesheet"
        href="style.css"
    >


    <!-- GOOGLE FONTS -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet"
    >


    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

</head>


<body class="category-page">


<!-- =========================================
     CATEGORY NAVBAR
========================================= -->

<header class="category-navbar">

    <a
        href="index.html"
        class="category-logo"
    >

        <img
            src="flopcorn-logo.jpeg.jpeg"
            alt="Flop Corn Logo"
        >

        <div>

            <h1>
                FLOP CORN
            </h1>

            <span>
                COLLECTIONS
            </span>

        </div>

    </a>


    <a
        href="explore.html"
        class="back-explore-button"
    >

        <i class="fa-solid fa-arrow-left"></i>

        Explore

    </a>

</header>


<!-- =========================================
     CATEGORY HERO
========================================= -->

<main>

<section class="category-hero">

    <div class="category-hero-glow"></div>


    <div class="category-hero-content">

        <p id="categorySmallTitle">

            🍿 FLOP CORN COLLECTION

        </p>


        <h2 id="categoryTitle">

            Loading Movies...

        </h2>


        <p id="categoryDescription">

            Finding movies worth watching.

        </p>


        <div class="category-information">

            <span>

                <i class="fa-solid fa-film"></i>

                Hand-picked movies

            </span>


            <span>

                <i class="fa-solid fa-star"></i>

                Popular picks

            </span>

        </div>

    </div>

</section>


<!-- =========================================
     MOVIE RESULTS
========================================= -->

<section class="category-movies-section">

    <div class="category-results-heading">

        <div>

            <p>
                RECOMMENDED FOR YOU
            </p>

            <h2 id="categoryResultsTitle">

                Movies

            </h2>

        </div>


        <a href="explore.html">

            View Categories

            <i class="fa-solid fa-compass"></i>

        </a>

    </div>


    <div
        class="category-movie-grid"
        id="categoryMovieGrid"
    >

        <!-- LOADING CARDS -->

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

        <div class="category-loading-card"></div>

    </div>

</section>

</main>


<!-- =========================================
     CATEGORY JAVASCRIPT
========================================= -->

<script
    src="category.js"
></script>


</body>

</html>
